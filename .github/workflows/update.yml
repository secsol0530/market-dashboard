name: update-market-briefing

on:
  schedule:
    - cron: "0,30 0-7 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 데이터 수집
        run: node scripts/fetch.mjs

      - name: 변경사항 커밋
        run: |
          git config user.name "market-bot"
          git config user.email "actions@github.com"
          git add data/briefing.json
          git diff --cached --quiet || git commit -m "chore: update briefing $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
